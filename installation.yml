- hosts: localhost
  connection: local
  tasks:
    - name: Install KDE's Debian packages
      apt:
        state: present
        name:
          - kde-config-sddm
          - sddm-theme-debian-breeze
          - kde-config-screenlocker
          - plymouth-theme-breeze
          - kde-config-plymouth
      become: true
      become_user: root
      tags: installinitialpackages

    - name: Configure Plymouth and GRUB
      block:
        - name: Copy GRUB config file
          copy:
            src: "{{ playbook_dir }}/dotfiles/etc/default/grub"
            dest: "/etc/default/grub"
            remote_src: true

        - name: Set Plymouth theme
          command: plymouth-set-default-theme -R breeze

        - name: Update GRUB
          command: update-grub2
      become: true
      become_user: root
      tags: configureplymouthgrub
    
    - name: Disable audio powersave
      copy:
        src: "{{ playbook_dir }}/dotfiles/etc/modprobe.d/audio_disable_powersave.conf"
        dest: "/etc/modprobe.d/audio_disable_powersave.conf"
        remote_src: true
      become: true
      become_user: root
      tags: fixaudiopop
    
    - name: Install battery thresholds daemon
      block:
        - name: Install tp-smapi
          apt:
            state: present
            name:
                - tp-smapi-dkms
      
        - name: Copy service
          copy:
            src: "{{ playbook_dir }}/dotfiles/etc/systemd/system/battery-thresholds.service"
            dest: "/etc/systemd/system/battery-thresholds.service"
            remote_src: true

        - name: Enable service
          service:
            name: battery-thresholds
            enabled: yes
            state: started
          
      become: true
      become_user: root
      tags: installbatterythresholds

    - name: Install and configure auto-cpufreq
      block:
        - name: Download auto-cpufreq
          git:
            repo: https://github.com/AdnanHodzic/auto-cpufreq.git
            dest: "tmp/"
            
        - name: Install auto-cpufreq
          shell: echo I | /tmp/auto-cpufreq/auto-cpufreq-installer
          args:
            executable: /bin/bash
          become: true
          become_user: root
        
        - name: Cleanup tmp/ folder
          file:
            path: "tmp/"
            state: absent
        
        - name: Install auto-cpufreq daemon
          command: auto-cpufreq --install
          become: true
          become_user: root
      tags: installauto-cpufreq
    
    - name: Configure pulseaudio
      copy: src={{ item.src }} dest={{ item.dest }}
      with_items:
        - {
            src: "{{ playbook_dir }}/dotfiles/etc/pulse/daemon.conf",
            dest: "/etc/pulse/daemon.conf",
          }
        - {
            src: "{{ playbook_dir }}/dotfiles/etc/pulse/default.pa",
            dest: "/etc/pulse/default.pa",
          }
      become: true
      become_user: root
      tags: confpulseaudio

    - name: Install Chrome
      block:
        - name: Add Chrome's APT signing key
          apt_key:
            url: "https://dl.google.com/linux/linux_signing_key.pub"
            state: present

        - name: Add Chrome's repository into sources
          apt_repository:
            repo: deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main
            state: present
            filename: google-chrome
          
        - name: Install Chrome stable
          apt:
            name: "google-chrome-stable"
            state: latest
            update_cache: true

      become: true
      become_user: root
      tags: installchrome

    - name: Install VSCode
      block:
        - name: Install VSCode
          apt:
            deb: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64

      become: true
      become_user: root
      tags: installvscode

    - name: Install and configure zsh and powerlevel10k
      block:          
        - name: Install zsh
          apt:
            state: present
            name: zsh
          become: true
          become_user: root

        - name: Get zsh path
          command: which zsh
          register: zsh_path

        - name: Change default shell
          command: chsh -s {{ zsh_path.stdout }} {{ lookup('env', 'USER') }}
          become: true
          become_user: root

        - name: Download and install powerlevel10k
          git:
            repo: https://github.com/romkatv/powerlevel10k.git
            dest: "{{ lookup('env', 'HOME') }}/.powerlevel10k"
            depth: 1

        - name: Copy .zshrc config file
          copy:
            src: "{{ playbook_dir }}/dotfiles/.zshrc"
            dest: "{{ lookup('env', 'HOME') }}/.zshrc"
            remote_src: true

        - name: Copy .p10k config file
          copy:
            src: "{{ playbook_dir }}/dotfiles/.p10k.zsh"
            dest: "{{ lookup('env', 'HOME') }}/.p10k.zsh"
            remote_src: true
      tags: installzsh

    - name: Load nano config
      copy:
         src: "{{ playbook_dir }}/dotfiles/.nanorc"
         dest: "{{ lookup('env', 'HOME') }}/.nanorc"
         remote_src: true
      tags: loadnanoconfig

    - name: Load sddm config
      block:
        - name: Find unused themes
          find:
            paths: /usr/share/sddm/themes/
            patterns: "debian-.*"
            use_regex: true
            file_type: directory
          register: folders_to_delete

        - name: Remove unused themes
          file:
            path: "{{ item.path }}"
            state: absent
          with_items: "{{ folders_to_delete.files }}"
          become: yes

        - name: Copy files
          copy: src={{ item.src }} dest={{ item.dest }}
          with_items:
                - { src: "{{ playbook_dir }}/dotfiles/sddm/theme.conf", dest: "/usr/share/sddm/themes/breeze/theme.conf" }
                - { src: "{{ playbook_dir }}/dotfiles/sddm/kde_settings.conf", dest: "/etc/sddm.conf.d/kde_settings.conf" }
          become: false
      tags: loadsddm

    - name: Debloat KDE
      apt:
        name:
          - "akonadi-*"
        state: absent
        autoremove: yes
      become: true
      become_user: root
      tags: debloatkde
      
    - name: Load whole config
      copy: src={{ item.src }} dest={{ item.dest }}
      with_items:
            - { src: "{{ playbook_dir }}/dotfiles/.config/", dest: "{{ lookup('env', 'HOME') }}/.config" }
            - { src: "{{ playbook_dir }}/dotfiles/.kde/", dest: "{{ lookup('env', 'HOME') }}/.kde" }
            - { src: "{{ playbook_dir }}/dotfiles/.local/", dest: "{{ lookup('env', 'HOME') }}/.local" }
      become: false
      tags: loadconfig
